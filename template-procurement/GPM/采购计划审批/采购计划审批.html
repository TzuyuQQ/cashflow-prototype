<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采购计划审批</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }

    /* ===== 顶部导航 ===== */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #fff; border-bottom: 1px solid #e4e7ed;
      display: flex; align-items: center; padding: 0 12px;
      z-index: 1000; gap: 8px;
    }
    .nav-hamburger { font-size: 18px; color: #909399; cursor: pointer; padding: 0 4px; }
    .nav-logo { display: flex; align-items: center; gap: 2px; margin-right: 10px; }
    .nav-logo-text { color: #1677ff; font-weight: bold; font-size: 16px; }
    .nav-logo-plus {
      background: #ff7a00; color: #fff; width: 18px; height: 18px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; line-height: 1;
    }
    .nav-tabs { display: flex; align-items: center; gap: 4px; flex: 1; }
    .nav-tab {
      font-size: 12px; padding: 3px 10px; border-radius: 12px;
      cursor: pointer; color: #606266; white-space: nowrap;
    }
    .nav-tab.active { background: #ff7a00; color: #fff; }
    .nav-tab.outline-green { border: 1px solid #67c23a; color: #67c23a; }
    .nav-right { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
    .nav-icon { font-size: 16px; color: #606266; cursor: pointer; }
    .nav-todo { position: relative; cursor: pointer; font-size: 13px; color: #606266; }
    .nav-badge {
      position: absolute; top: -8px; right: -28px;
      background: #f56c6c; color: #fff; font-size: 10px;
      padding: 1px 4px; border-radius: 8px; white-space: nowrap;
    }
    .nav-arrow { font-size: 12px; color: #909399; margin-left: 32px; }
    .nav-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: #c0c4cc; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; cursor: pointer;
    }
    .nav-admin-btn {
      border: 1px solid #1677ff; color: #1677ff; background: transparent;
      padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      white-space: nowrap;
    }

    /* ===== 左侧边栏 ===== */
    .sidebar {
      position: fixed; top: 48px; left: 0; bottom: 0;
      width: 200px; background: #1a5fa0;
      display: flex; flex-direction: column;
      z-index: 900; overflow-y: auto;
    }
    .sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-logo-txt { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .sidebar-hamburger-btn { font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer; }
    .sidebar-group { margin-top: 4px; }
    .sidebar-group-title {
      padding: 10px 16px 4px;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5);
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px; font-size: 13px; color: rgba(255,255,255,0.85);
      cursor: pointer; transition: background 0.15s;
      border-left: 3px solid transparent; text-decoration: none;
    }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-nav-item.active {
      background: rgba(255,255,255,0.18); color: #fff;
      border-left-color: #fff; font-weight: 600;
    }
    .sni-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

    /* ===== 主体 ===== */
    .main-wrapper { margin-left: 200px; margin-top: 48px; }
    .breadcrumb-bar {
      height: 40px; background: #fff; border-bottom: 1px solid #e4e7ed;
      padding: 0 20px; display: flex; align-items: center;
      font-size: 13px; color: #909399;
    }
    .breadcrumb-bar span.sep { margin: 0 6px; }
    .breadcrumb-bar span.current { color: #303133; }
    .content-area { padding: 16px 20px; }
    .card { background: #fff; border-radius: 4px; padding: 16px 20px; margin-bottom: 12px; }

    /* ===== 筛选区 ===== */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px 12px;
      align-items: center;
    }
    .filter-btns { grid-column: 5; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .filter-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #606266; min-width: 0; }
    .filter-item > span { white-space: nowrap; flex-shrink: 0; width: 6em; text-align: right; }
    .filter-item .el-input,
    .filter-item .el-select { flex: 1; min-width: 0; }

    /* ===== 主色覆盖 ===== */
    .el-button--primary { --el-button-bg-color: #1677ff; --el-button-border-color: #1677ff; --el-button-hover-bg-color: #4096ff; --el-button-hover-border-color: #4096ff; }
    .el-button--success.is-link { --el-button-text-color: #52c41a; --el-button-hover-bg-color: rgba(82,196,26,0.06); }
    .el-button--danger.is-link  { --el-button-text-color: #f5222d; --el-button-hover-bg-color: rgba(245,34,45,0.06); }
    .el-button--primary.is-link { --el-button-text-color: #1677ff; --el-button-hover-bg-color: rgba(22,119,255,0.06); }

    /* ===== Tab ===== */
    .approval-tabs .el-tabs__content { padding-top: 16px; }

    /* ===== 空态 ===== */
    .empty-state { padding: 56px 0; text-align: center; color: #c0c4cc; }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .empty-text { font-size: 14px; color: #909399; }

    /* ===== 分页 ===== */
    .pagination-bar { display: flex; justify-content: flex-end; padding-top: 12px; }

    /* 操作列按钮间距 */
    .op-cell { display: flex; align-items: center; gap: 2px; flex-wrap: nowrap; }

    /* ===== 详情抽屉内容 ===== */
    .drawer-body { padding: 0 24px 24px; overflow-y: auto; }
    .drawer-section {
      margin-bottom: 16px; background: #fff;
      border: 1px solid #e4e7ed; border-radius: 4px; padding: 16px 20px;
    }
    .drawer-section-title {
      font-size: 14px; font-weight: 600; color: #303133;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid #f0f2f5;
    }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px 24px; margin-bottom: 12px;
    }
    .form-row.full { grid-template-columns: 1fr; }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label { font-size: 12px; color: #909399; }
    .form-field .val { font-size: 13px; color: #303133; padding: 6px 8px; background: #f5f7fa; border-radius: 3px; min-height: 32px; line-height: 1.5; }
    .form-field .val.multi { min-height: 72px; white-space: pre-wrap; }
    .plan-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .plan-table th, .plan-table td { border: 1px solid #ebeef5; padding: 8px 10px; text-align: left; }
    .plan-table th { background: #f5f7fa; color: #606266; font-weight: 500; }
    .attachment-list { display: flex; flex-direction: column; gap: 6px; }
    .attachment-item { display: flex; align-items: center; gap: 6px; color: #1677ff; font-size: 13px; cursor: pointer; }
    .attachment-item::before { content: '📎'; }
    .no-attachment { font-size: 13px; color: #c0c4cc; }

    /* 抽屉底部操作 */
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid #e4e7ed;
      display: flex; justify-content: flex-end; gap: 10px;
      background: #fff;
      flex-shrink: 0;
    }

    /* 审批状态徽章（抽屉标题旁） */
    .drawer-status-badge { margin-left: 10px; vertical-align: middle; }

    /* 审批流展示 */
    .approval-flow { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .flow-node {
      border: 1px solid #e4e7ed; border-radius: 4px;
      padding: 8px 14px; text-align: center; min-width: 90px;
      background: #fff;
    }
    .flow-node .node-role { font-size: 11px; color: #909399; margin-bottom: 3px; }
    .flow-node .node-name { font-size: 13px; color: #303133; font-weight: 500; }
    .flow-node.pending-node { border-color: #fa8c16; background: #fff7e6; }
    .flow-node.done-node { border-color: #52c41a; background: #f6ffed; }
    .flow-node.rejected-node { border-color: #f5222d; background: #fff1f0; }
    .flow-arrow { color: #c0c4cc; font-size: 18px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== 顶部导航 ===== -->
  <div class="top-nav">
    <span class="nav-hamburger">☰</span>
    <div class="nav-logo">
      <span class="nav-logo-text">Geek</span>
      <span class="nav-logo-plus">+</span>
    </div>
    <div class="nav-tabs">
      <span class="nav-tab">GOP</span>
      <span class="nav-tab active">GPM</span>
      <span class="nav-tab">SS</span>
      <span class="nav-tab">CPQ</span>
      <span class="nav-tab outline-green">GPP</span>
      <span class="nav-tab">GTS</span>
      <span class="nav-tab">IS</span>
      <span class="nav-tab">ACCOUNT</span>
      <span class="nav-tab">OMS</span>
      <span class="nav-tab">FTS</span>
      <span class="nav-tab">GRP</span>
    </div>
    <div class="nav-right">
      <span class="nav-icon">⊞</span>
      <span class="nav-icon">⚙</span>
      <span class="nav-todo">
        ToDo
        <span class="nav-badge">1232</span>
      </span>
      <span class="nav-arrow">∨</span>
      <div class="nav-avatar">U</div>
      <button class="nav-admin-btn">进入管理后台</button>
    </div>
  </div>

  <!-- ===== 左侧边栏 ===== -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo-txt">GPM</span>
      <span class="sidebar-hamburger-btn">☰</span>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">采购管理</div>
      <a class="sidebar-nav-item" href="../采购计划单列表/采购计划单列表.html">
        <span class="sni-icon">📋</span>采购计划单列表
      </a>
      <a class="sidebar-nav-item" href="../我的采购任务/我的采购任务.html"><span class="sni-icon">📌</span>我的采购任务</a>
      <a class="sidebar-nav-item" href="../采购台账/采购台账.html">
        <span class="sni-icon">📊</span>采购台账
      </a>
      <a class="sidebar-nav-item active" href="../采购计划审批/采购计划审批.html">
        <span class="sni-icon">✅</span>采购计划审批
      </a>
      <a class="sidebar-nav-item" href="../供应商付款申请审批/供应商付款申请审批.html">
        <span class="sni-icon">💰</span>供应商付款申请审批
      </a>
      <a class="sidebar-nav-item" href="../PO应付清单/PO应付清单.html">
        <span class="sni-icon">📄</span>PO 应付清单
      </a>
    </div>
  </div>

  <!-- ===== 主内容 ===== -->
  <div class="main-wrapper">

    <!-- 面包屑 -->
    <div class="breadcrumb-bar">
      <span>采购管理</span>
      <span class="sep">/</span>
      <span class="current">采购计划审批</span>
    </div>

    <!-- 内容区 -->
    <div class="content-area">

      <!-- 筛选区 -->
      <div class="card">
        <div class="filter-grid">
          <div class="filter-item">
            <span>采购计划编号</span>
            <el-input placeholder="请输入" size="small"></el-input>
          </div>
          <div class="filter-item">
            <span>项目编号</span>
            <el-input placeholder="请输入" size="small"></el-input>
          </div>
          <div class="filter-item">
            <span>项目名称</span>
            <el-input placeholder="请输入" size="small"></el-input>
          </div>
          <div class="filter-item">
            <span>申请人</span>
            <el-input placeholder="请输入" size="small"></el-input>
          </div>
          <div class="filter-btns">
            <el-button type="primary" size="small">查询</el-button>
            <el-button size="small">重置</el-button>
          </div>
        </div>
      </div>

      <!-- Tab + 表格区 -->
      <div class="card">
        <el-tabs v-model="activeTab" class="approval-tabs">

          <!-- ===== 待审批 Tab ===== -->
          <el-tab-pane :label="`待审批 (${pendingData.length})`" name="pending">
            <div v-if="pendingData.length === 0" class="empty-state">
              <div class="empty-icon">✅</div>
              <div class="empty-text">暂无待审批申请</div>
            </div>
            <el-table v-else :data="pendingData" border style="width:100%;" size="small">
              <el-table-column label="采购计划编号" prop="applyNo" min-width="130"></el-table-column>
              <el-table-column label="项目编号" prop="projectNo" min-width="120"></el-table-column>
              <el-table-column label="项目名称" prop="projectName" min-width="200"></el-table-column>
              <el-table-column label="申请人" prop="applicant" width="90"></el-table-column>
              <el-table-column label="申请日期" prop="applyDate" width="110"></el-table-column>
              <el-table-column label="采购内容摘要" prop="summary" min-width="160"></el-table-column>
              <el-table-column label="操作" width="100" fixed="right">
                <template #default="{ row }">
                  <div class="op-cell">
                    <el-button link type="primary" size="small" @click="openDetail(row, 'pending')">查看详情</el-button>
                  </div>
                </template>
              </el-table-column>
            </el-table>
            <div class="pagination-bar" v-if="pendingData.length > 0">
              <el-pagination background layout="total, prev, pager, next"
                :total="pendingData.length" :page-size="10" :current-page="1" small></el-pagination>
            </div>
          </el-tab-pane>

          <!-- ===== 已审批 Tab ===== -->
          <el-tab-pane label="已审批" name="done">
            <el-table :data="doneData" border style="width:100%;" size="small">
              <el-table-column label="采购计划编号" prop="applyNo" min-width="130"></el-table-column>
              <el-table-column label="项目编号" prop="projectNo" min-width="120"></el-table-column>
              <el-table-column label="项目名称" prop="projectName" min-width="200"></el-table-column>
              <el-table-column label="申请人" prop="applicant" width="90"></el-table-column>
              <el-table-column label="申请日期" prop="applyDate" width="110"></el-table-column>
              <el-table-column label="采购内容摘要" prop="summary" min-width="160"></el-table-column>
              <el-table-column label="审批状态" width="100" align="center">
                <template #default="{ row }">
                  <el-tag :type="row.statusType" size="small">{{ row.statusLabel }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="操作" width="100" fixed="right">
                <template #default="{ row }">
                  <el-button link type="primary" size="small" @click="openDetail(row, 'done')">查看详情</el-button>
                </template>
              </el-table-column>
            </el-table>
            <div class="pagination-bar">
              <el-pagination background layout="total, prev, pager, next"
                :total="doneData.length" :page-size="10" :current-page="1" small></el-pagination>
            </div>
          </el-tab-pane>

        </el-tabs>
      </div>

    </div>
  </div>

  <!-- ===== 详情抽屉 ===== -->
  <el-drawer
    v-model="drawerVisible"
    :title="drawerRow ? drawerRow.applyNo : ''"
    size="780px"
    direction="rtl"
    :destroy-on-close="true"
  >
    <!-- 标题栏附加状态标签（已审批） -->
    <template #header>
      <span style="font-size:15px;font-weight:600;color:#303133">
        {{ drawerRow ? drawerRow.applyNo : '' }}
      </span>
      <el-tag
        v-if="drawerMode === 'done' && drawerRow"
        :type="drawerRow.statusType"
        size="small"
        class="drawer-status-badge"
      >{{ drawerRow.statusLabel }}</el-tag>
    </template>

    <template #default>
      <div class="drawer-body" v-if="drawerRow">

        <!-- Part 1 采购基本信息 -->
        <div class="drawer-section">
          <div class="drawer-section-title">Part 1 采购基本信息</div>
          <div class="form-row">
            <div class="form-field">
              <label>采购计划编号</label>
              <div class="val">{{ drawerRow.applyNo }}</div>
            </div>
            <div class="form-field">
              <label>项目编号</label>
              <div class="val">{{ drawerRow.projectNo }}</div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>项目名称</label>
              <div class="val">{{ drawerRow.projectName }}</div>
            </div>
            <div class="form-field">
              <label>项目所在地</label>
              <div class="val">中国 / 广东省</div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>项目基本情况</label>
              <div class="val multi">本项目为仓储智能化升级改造项目，涉及自动化立体仓库系统集成，包括货架、堆垛机、输送线及 WCS 控制系统，预计建设工期 8 个月。</div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>申请采购内容</label>
              <div class="val multi">{{ drawerRow.summary }}，具体包括：设备选型技术规格书、安装调试方案、供应商资质审查。技术标准参照 GB/T 28561-2012 自动化立体仓库设计规范。</div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>采购交付要求</label>
              <div class="val multi">验收要求：按技术规格书逐项验收；质保期：设备质保 24 个月；付款条件：预付 30%，到货验收后付 60%，质保期满付 10%；备品备件：提供 2 年备件清单。</div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>采购预算</label>
              <div class="val multi">设备采购预算 ¥320 万元（含安装调试），其中硬件设备 ¥260 万元，软件集成 ¥40 万元，备品备件 ¥20 万元。</div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>到货/入场时间</label>
              <div class="val">2026-09-01</div>
            </div>
            <div class="form-field">
              <label>调试完成/撤场时间</label>
              <div class="val">2026-11-30</div>
            </div>
          </div>
        </div>

        <!-- Part 2 采购计划 -->
        <div class="drawer-section">
          <div class="drawer-section-title">Part 2 采购计划</div>
          <table class="plan-table">
            <thead>
              <tr>
                <th>任务名称</th>
                <th>计划完成时间</th>
                <th>责任人</th>
                <th>交付物要求</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>技术文件</td>
                <td>2026-07-15</td>
                <td>王工</td>
                <td><el-tag size="small" type="info">上传技术文件</el-tag></td>
              </tr>
              <tr>
                <td>招采发起</td>
                <td>2026-07-25</td>
                <td>李采购</td>
                <td><el-tag size="small" type="info">上传招采文件</el-tag></td>
              </tr>
              <tr>
                <td>定标完成</td>
                <td>2026-08-10</td>
                <td>李采购</td>
                <td><el-tag size="small" type="info">填写中标信息</el-tag></td>
              </tr>
              <tr>
                <td>采购合同/PO 签订</td>
                <td>2026-08-20</td>
                <td>李采购</td>
                <td><el-tag size="small" type="info">上传合同文件</el-tag></td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Part 3 附件 -->
        <div class="drawer-section">
          <div class="drawer-section-title">Part 3 附件</div>
          <div class="form-row full">
            <div class="form-field">
              <label>技术文件</label>
              <div class="val">
                <div class="attachment-list">
                  <span class="attachment-item">技术规格书-v1.2.pdf</span>
                </div>
              </div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>合同模版</label>
              <div class="val">
                <span class="no-attachment">未上传</span>
              </div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>其他文件</label>
              <div class="val">
                <span class="no-attachment">未上传</span>
              </div>
            </div>
          </div>
        </div>


      </div>
    </template>

    <!-- 底部操作：待审批时显示通过/驳回；已审批时不显示 -->
    <template #footer>
      <div class="drawer-footer">
        <el-button @click="drawerVisible = false">关闭</el-button>
        <template v-if="drawerMode === 'pending' && drawerRow">
          <el-button type="danger" plain @click="rejectFromDrawer">驳回</el-button>
          <el-button type="success" @click="approveFromDrawer">通过</el-button>
        </template>
      </div>
    </template>
  </el-drawer>

</div>

<script>
const { createApp } = Vue;
const app = createApp({
  data() {
    return {
      activeTab: 'pending',
      drawerVisible: false,
      drawerRow: null,
      drawerMode: 'pending', // 'pending' | 'done'
      tableData: [
        {
          applyNo: 'CG-2026-006', projectNo: 'GPMS260070',
          projectName: 'P-京东-CN-仓库-Ⅱ期', applicant: '陈经理',
          applyDate: '2026-06-22', summary: '货架存储系统采购',
          status: 'pending', statusLabel: '待审批', statusType: 'warning',
        },
        {
          applyNo: 'CG-2026-007', projectNo: 'GPMS260071',
          projectName: 'P-沃尔玛-ID-配送中心', applicant: '刘经理',
          applyDate: '2026-06-20', summary: 'AGV搬运设备采购',
          status: 'pending', statusLabel: '待审批', statusType: 'warning',
        },
        {
          applyNo: 'CG-2026-001', projectNo: 'GPMS260015',
          projectName: 'P-希音-CN-肇庆-电商-Ⅳ期', applicant: '张三',
          applyDate: '2026-06-10', summary: '物料存储系统采购',
          status: 'approved', statusLabel: '已通过', statusType: 'success',
        },
        {
          applyNo: 'CG-2026-004', projectNo: 'GPMS250446',
          projectName: 'P-UNILEVER-ID-仓库-Ⅰ期', applicant: '赵六',
          applyDate: '2026-05-15', summary: '技术服务类采购',
          status: 'rejected', statusLabel: '已驳回', statusType: 'danger',
        },
      ],
    };
  },
  computed: {
    pendingData() {
      return this.tableData.filter(r => r.status === 'pending');
    },
    doneData() {
      return this.tableData.filter(r => r.status !== 'pending');
    },
  },
  methods: {
    openDetail(row, mode) {
      this.drawerRow = row;
      this.drawerMode = mode;
      this.drawerVisible = true;
    },
    approveFromDrawer() {
      ElementPlus.ElMessageBox.confirm(
        `确认通过【${this.drawerRow.applyNo}】的采购计划？`,
        '审批确认',
        { confirmButtonText: '确认通过', cancelButtonText: '取消', type: 'success' }
      ).then(() => {
        this.drawerRow.status = 'approved';
        this.drawerRow.statusLabel = '已通过';
        this.drawerRow.statusType = 'success';
        this.drawerVisible = false;
        ElementPlus.ElMessage.success('审批通过');
      }).catch(() => {});
    },
    rejectFromDrawer() {
      ElementPlus.ElMessageBox.prompt(
        '请填写驳回原因',
        '驳回申请',
        { confirmButtonText: '确认驳回', cancelButtonText: '取消', inputPlaceholder: '请输入驳回原因…', type: 'warning' }
      ).then(({ value }) => {
        this.drawerRow.status = 'rejected';
        this.drawerRow.statusLabel = '已驳回';
        this.drawerRow.statusType = 'danger';
        this.drawerVisible = false;
        ElementPlus.ElMessage.warning('已驳回');
      }).catch(() => {});
    },
  },
});
app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
