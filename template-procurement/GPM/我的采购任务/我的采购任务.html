<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的采购任务 - GPM</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }

    .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #fff; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center; padding: 0 12px; z-index: 1000; gap: 8px; }
    .nav-hamburger { font-size: 18px; color: #909399; cursor: pointer; padding: 0 4px; }
    .nav-logo { display: flex; align-items: center; gap: 2px; margin-right: 10px; }
    .nav-logo-text { color: #1677ff; font-weight: bold; font-size: 16px; }
    .nav-logo-plus { background: #ff7a00; color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
    .nav-tabs { display: flex; align-items: center; gap: 4px; flex: 1; }
    .nav-tab { font-size: 12px; padding: 3px 10px; border-radius: 12px; cursor: pointer; color: #606266; white-space: nowrap; }
    .nav-tab.active { background: #ff7a00; color: #fff; }
    .nav-tab.outline-green { border: 1px solid #67c23a; color: #67c23a; }
    .nav-right { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
    .nav-icon { font-size: 16px; color: #606266; cursor: pointer; }
    .nav-todo { position: relative; cursor: pointer; font-size: 13px; color: #606266; }
    .nav-badge { position: absolute; top: -8px; right: -28px; background: #f56c6c; color: #fff; font-size: 10px; padding: 1px 4px; border-radius: 8px; }
    .nav-avatar { width: 26px; height: 26px; border-radius: 50%; background: #c0c4cc; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; cursor: pointer; }
    .nav-admin-btn { border: 1px solid #1677ff; color: #1677ff; background: transparent; padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap; }

    .sidebar { position: fixed; top: 48px; left: 0; bottom: 0; width: 200px; background: #1a5fa0; display: flex; flex-direction: column; z-index: 900; overflow-y: auto; }
    .sidebar-header { padding: 14px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sidebar-logo-txt { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .sidebar-hamburger-btn { font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer; }
    .sidebar-group { margin-top: 4px; }
    .sidebar-group-title { padding: 10px 16px 4px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; font-size: 13px; color: rgba(255,255,255,0.85); cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; text-decoration: none; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; font-weight: 600; }
    .sni-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

    .main-content { margin-left: 200px; margin-top: 48px; }
    .breadcrumb-bar { height: 40px; background: #fff; border-bottom: 1px solid #e4e7ed; padding: 0 20px; display: flex; align-items: center; font-size: 13px; color: #909399; gap: 6px; }
    .breadcrumb-bar .current { color: #303133; font-weight: 500; }
    .content-area { padding: 16px 20px; }
    .card { background: #fff; border-radius: 4px; margin-bottom: 12px; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
    .dot-green  { background: #67c23a; }
    .dot-yellow { background: #e6a23c; }
    .dot-red    { background: #f56c6c; }
    .dot-gray   { background: #c0c4cc; }

    .status-tabs { display: flex; border-bottom: 1px solid #e4e7ed; padding: 0 20px; }
    .status-tab { padding: 13px 14px; font-size: 13px; cursor: pointer; color: #606266; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
    .status-tab:hover { color: #1677ff; }
    .status-tab.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 600; }
    .tab-count { display: inline-block; background: #f0f2f5; color: #909399; border-radius: 10px; padding: 0 6px; font-size: 11px; margin-left: 4px; line-height: 18px; }
    .status-tab.active .tab-count { background: #e6f4ff; color: #1677ff; }

    .table-area { padding: 0 20px 16px; }
    .pagination-bar { display: flex; justify-content: flex-end; padding-top: 12px; }

    .task-name-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: 500; }
    .badge-award    { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
    .badge-contract { background: #e6f4ff; color: #0958d9; border: 1px solid #91caff; }
    .badge-tech     { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .badge-bid      { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
    .badge-default  { background: #f5f5f5; color: #595959; border: 1px solid #d9d9d9; }

    .overdue-row { background: #fff2f0 !important; }
    .overdue-row td { background: #fff2f0 !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- 顶部导航 -->
  <div class="top-nav">
    <span class="nav-hamburger">☰</span>
    <div class="nav-logo">
      <span class="nav-logo-text">Geek</span>
      <span class="nav-logo-plus">+</span>
    </div>
    <div class="nav-tabs">
      <span class="nav-tab">GOP</span>
      <span class="nav-tab active">GPM</span>
      <span class="nav-tab">SS</span>
      <span class="nav-tab">CPQ</span>
      <span class="nav-tab outline-green">GPP</span>
      <span class="nav-tab">GTS</span>
      <span class="nav-tab">IS</span>
      <span class="nav-tab">ACCOUNT</span>
      <span class="nav-tab">OMS</span>
      <span class="nav-tab">FTS</span>
      <span class="nav-tab">GRP</span>
    </div>
    <div class="nav-right">
      <span class="nav-icon">⊞</span>
      <span class="nav-icon">⚙</span>
      <span class="nav-todo">ToDo<span class="nav-badge">{{ pendingCount }}</span></span>
      <div class="nav-avatar">U</div>
      <button class="nav-admin-btn">进入管理后台</button>
    </div>
  </div>

  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo-txt">GPM</span>
      <span class="sidebar-hamburger-btn">☰</span>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">采购管理</div>
      <a class="sidebar-nav-item" href="../采购计划单列表/采购计划单列表.html"><span class="sni-icon">📋</span>采购计划单列表</a>
      <a class="sidebar-nav-item active" href="../我的采购任务/我的采购任务.html"><span class="sni-icon">📌</span>我的采购任务</a>
      <a class="sidebar-nav-item" href="../采购台账/采购台账.html"><span class="sni-icon">📊</span>采购台账</a>
      <a class="sidebar-nav-item" href="../采购计划审批/采购计划审批.html"><span class="sni-icon">✅</span>采购计划审批</a>
      <a class="sidebar-nav-item" href="../供应商付款申请审批/供应商付款申请审批.html"><span class="sni-icon">💰</span>供应商付款申请审批</a>
      <a class="sidebar-nav-item" href="../PO应付清单/PO应付清单.html"><span class="sni-icon">📄</span>PO 应付清单</a>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <div class="breadcrumb-bar">
      <span>采购管理</span><span>/</span><span class="current">我的采购任务</span>
    </div>

    <div class="content-area">
      <div class="card">

        <!-- 状态页签 -->
        <div class="status-tabs">
          <div class="status-tab" :class="{active: activeTab==='全部'}" @click="activeTab='全部'">
            全部<span class="tab-count">{{ tabCounts['全部'] }}</span>
          </div>
          <div class="status-tab" :class="{active: activeTab==='未完成'}" @click="activeTab='未完成'">
            未完成<span class="tab-count">{{ tabCounts['未完成'] }}</span>
          </div>
          <div class="status-tab" :class="{active: activeTab==='已逾期'}" @click="activeTab='已逾期'">
            已逾期<span class="tab-count">{{ tabCounts['已逾期'] }}</span>
          </div>
          <div class="status-tab" :class="{active: activeTab==='已完成'}" @click="activeTab='已完成'">
            已完成<span class="tab-count">{{ tabCounts['已完成'] }}</span>
          </div>
        </div>

        <!-- 表格 -->
        <div class="table-area" style="margin-top:12px;">
          <el-table
            :data="filteredTasks"
            border
            style="width:100%;"
            :row-class-name="rowClass"
            :header-cell-style="{ background:'#f5f7fa', color:'#606266', fontWeight:'600', fontSize:'13px' }"
            :cell-style="{ fontSize:'13px', verticalAlign:'middle' }"
          >
            <el-table-column label="状态" width="130">
              <template #default="{ row }">
                <span class="status-dot" :class="row.dotClass"></span>
                <span style="font-size:12px;">{{ dotLabel(row.dotClass) }}</span>
              </template>
            </el-table-column>
            <el-table-column label="任务名称" width="160">
              <template #default="{ row }">
                <span :class="['task-name-badge', taskBadgeClass(row.taskName)]">{{ row.taskName }}</span>
              </template>
            </el-table-column>
            <el-table-column label="采购计划编号" prop="applyNo" width="130"></el-table-column>
            <el-table-column label="项目名称" prop="projectName" min-width="200"></el-table-column>
            <el-table-column label="计划完成日期" prop="planDate" width="120"></el-table-column>
            <el-table-column label="实际完成日期" width="120">
              <template #default="{ row }">
                <span v-if="row.done" style="color:#67c23a;">{{ row.actualDate }}</span>
                <span v-else style="color:#c0c4cc;">—</span>
              </template>
            </el-table-column>
            <el-table-column label="操作" width="100" fixed="right">
              <template #default="{ row }">
                <el-button v-if="!row.done" type="primary" link size="small" @click="goComplete(row)">去完成</el-button>
                <el-button v-else link size="small" style="color:#909399;" @click="goComplete(row)">查看</el-button>
              </template>
            </el-table-column>
          </el-table>

          <div class="pagination-bar">
            <el-pagination background layout="total, prev, pager, next" :total="filteredTasks.length" :page-size="10" :current-page="1"></el-pagination>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>
<script>
const { createApp } = Vue;
const app = createApp({
  data() {
    return {
      activeTab: '全部',
      tasks: [
        { applyNo: 'CG-2026-001', projectName: 'P-希音-CN-肇庆-电商-Ⅳ期',      taskName: '定标完成',       planDate: '2026-07-21', dotClass: 'dot-yellow', done: false, actualDate: '' },
        { applyNo: 'CG-2026-002', projectName: 'P-UNILEVER-AR-仓库-Ⅰ期',        taskName: '招采要求发送',   planDate: '2026-07-10', dotClass: 'dot-red',    done: false, actualDate: '' },
        { applyNo: 'CG-2026-001', projectName: 'P-希音-CN-肇庆-电商-Ⅳ期',      taskName: '采购合同/PO签订', planDate: '2026-07-26', dotClass: 'dot-gray',   done: true,  actualDate: '2026-07-28' },
        { applyNo: 'CG-2026-003', projectName: 'P-US ELOGISTICS-仓库',           taskName: '定标完成',       planDate: '2026-07-05', dotClass: 'dot-green',  done: true,  actualDate: '2026-07-04' },
        { applyNo: 'CG-2026-003', projectName: 'P-US ELOGISTICS-仓库',           taskName: '采购合同/PO签订', planDate: '2026-07-15', dotClass: 'dot-green',  done: true,  actualDate: '2026-07-15' },
      ],
    };
  },
  computed: {
    filteredTasks() {
      if (this.activeTab === '全部')   return this.tasks;
      if (this.activeTab === '未完成') return this.tasks.filter(t => !t.done && t.dotClass !== 'dot-red');
      if (this.activeTab === '已逾期') return this.tasks.filter(t => t.dotClass === 'dot-red');
      if (this.activeTab === '已完成') return this.tasks.filter(t => t.done);
      return this.tasks;
    },
    tabCounts() {
      return {
        '全部':   this.tasks.length,
        '未完成': this.tasks.filter(t => !t.done && t.dotClass !== 'dot-red').length,
        '已逾期': this.tasks.filter(t => t.dotClass === 'dot-red').length,
        '已完成': this.tasks.filter(t => t.done).length,
      };
    },
    pendingCount() {
      return this.tasks.filter(t => !t.done).length;
    },
  },
  methods: {
    dotLabel(cls) {
      return { 'dot-green': '已完成', 'dot-yellow': '临近截止', 'dot-red': '已逾期', 'dot-gray': '已完成（含延期）' }[cls] || '-';
    },
    taskBadgeClass(name) {
      if (name === '定标完成')       return 'badge-award';
      if (name.includes('合同'))     return 'badge-contract';
      if (name.includes('技术'))     return 'badge-tech';
      if (name.includes('招采'))     return 'badge-bid';
      return 'badge-default';
    },
    rowClass({ row }) {
      return row.dotClass === 'dot-red' ? 'overdue-row' : '';
    },
    goComplete(row) {
      window.location.href = '../更新任务/更新任务.html';
    },
  },
});
app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
