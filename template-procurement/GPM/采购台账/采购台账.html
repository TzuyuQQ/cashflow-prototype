<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采购台账</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }

    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #fff; border-bottom: 1px solid #e4e7ed;
      display: flex; align-items: center; padding: 0 12px;
      z-index: 1000; gap: 8px;
    }
    .nav-hamburger { font-size: 18px; color: #909399; cursor: pointer; padding: 0 4px; }
    .nav-logo { display: flex; align-items: center; gap: 2px; margin-right: 10px; }
    .nav-logo-text { color: #1677ff; font-weight: bold; font-size: 16px; }
    .nav-logo-plus {
      background: #ff7a00; color: #fff; width: 18px; height: 18px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; line-height: 1;
    }
    .nav-tabs { display: flex; align-items: center; gap: 4px; flex: 1; }
    .nav-tab { font-size: 12px; padding: 3px 10px; border-radius: 12px; cursor: pointer; color: #606266; white-space: nowrap; }
    .nav-tab.active { background: #ff7a00; color: #fff; }
    .nav-tab.outline-green { border: 1px solid #67c23a; color: #67c23a; }
    .nav-right { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
    .nav-icon { font-size: 16px; color: #606266; cursor: pointer; }
    .nav-todo { position: relative; cursor: pointer; font-size: 13px; color: #606266; }
    .nav-badge { position: absolute; top: -8px; right: -28px; background: #f56c6c; color: #fff; font-size: 10px; padding: 1px 4px; border-radius: 8px; white-space: nowrap; }
    .nav-arrow { font-size: 12px; color: #909399; margin-left: 32px; }
    .nav-avatar { width: 26px; height: 26px; border-radius: 50%; background: #c0c4cc; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; cursor: pointer; }
    .nav-admin-btn { border: 1px solid #1677ff; color: #1677ff; background: transparent; padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap; }

    .sidebar { position: fixed; top: 48px; left: 0; bottom: 0; width: 200px; background: #1a5fa0; display: flex; flex-direction: column; z-index: 900; overflow-y: auto; }
    .sidebar-header { padding: 14px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sidebar-logo-txt { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .sidebar-hamburger-btn { font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer; }
    .sidebar-group { margin-top: 4px; }
    .sidebar-group-title { padding: 10px 16px 4px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; font-size: 13px; color: rgba(255,255,255,0.85); cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; text-decoration: none; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; font-weight: 600; }
    .sni-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

    .main-wrapper { margin-left: 200px; margin-top: 48px; }
    .breadcrumb-bar { height: 40px; background: #fff; border-bottom: 1px solid #e4e7ed; padding: 0 20px; display: flex; align-items: center; font-size: 13px; color: #909399; }
    .breadcrumb-bar span.sep { margin: 0 6px; }
    .breadcrumb-bar span.current { color: #303133; }
    .content-area { padding: 16px 20px; }
    .card { background: #fff; border-radius: 4px; padding: 16px 20px; margin-bottom: 12px; }

    .filter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px 12px; align-items: center; }
    .filter-btns { grid-column: 5; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .filter-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #606266; min-width: 0; }
    .filter-item > span { white-space: nowrap; flex-shrink: 0; width: 6em; text-align: right; }
    .filter-item .el-input, .filter-item .el-select { flex: 1; min-width: 0; }

    .el-button--primary { --el-button-bg-color: #1677ff; --el-button-border-color: #1677ff; --el-button-hover-bg-color: #4096ff; --el-button-hover-border-color: #4096ff; }
    .el-button--warning.is-link { --el-button-text-color: #e6a23c; --el-button-hover-bg-color: rgba(230,162,60,0.06); }
    .el-button--primary.is-link { --el-button-text-color: #1677ff; --el-button-hover-bg-color: rgba(22,119,255,0.06); }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }
    .dot-green  { background: #67c23a; }
    .dot-yellow { background: #e6a23c; }
    .dot-red    { background: #f56c6c; }
    .dot-gray   { background: #c0c4cc; }
    .date-cell  { display: flex; align-items: center; white-space: nowrap; cursor: pointer; }
    .date-cell:hover { opacity: 0.75; }

    .dot-legend { display: flex; align-items: center; gap: 16px; font-size: 12px; color: #909399; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #f0f2f5; }
    .dot-legend-item { display: flex; align-items: center; gap: 4px; }

    .table-wrapper { }
    .el-table .el-table__header-wrapper th { text-align: center; }
    .pagination-bar { display: flex; justify-content: flex-end; padding-top: 12px; }

    .cell-truncate { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  </style>
</head>
<body>
<div id="app">

  <div class="top-nav">
    <span class="nav-hamburger">☰</span>
    <div class="nav-logo">
      <span class="nav-logo-text">Geek</span>
      <span class="nav-logo-plus">+</span>
    </div>
    <div class="nav-tabs">
      <span class="nav-tab">GOP</span>
      <span class="nav-tab active">GPM</span>
      <span class="nav-tab">SS</span>
      <span class="nav-tab">CPQ</span>
      <span class="nav-tab outline-green">GPP</span>
      <span class="nav-tab">GTS</span>
      <span class="nav-tab">IS</span>
      <span class="nav-tab">ACCOUNT</span>
      <span class="nav-tab">OMS</span>
      <span class="nav-tab">FTS</span>
      <span class="nav-tab">GRP</span>
    </div>
    <div class="nav-right">
      <span class="nav-icon">⊞</span>
      <span class="nav-icon">⚙</span>
      <span class="nav-todo">ToDo<span class="nav-badge">1232</span></span>
      <span class="nav-arrow">∨</span>
      <div class="nav-avatar">U</div>
      <button class="nav-admin-btn">进入管理后台</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo-txt">GPM</span>
      <span class="sidebar-hamburger-btn">☰</span>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">采购管理</div>
      <a class="sidebar-nav-item" href="../采购计划单列表/采购计划单列表.html"><span class="sni-icon">📋</span>采购计划单列表</a>
      <a class="sidebar-nav-item" href="../我的采购任务/我的采购任务.html"><span class="sni-icon">📌</span>我的采购任务</a>
      <a class="sidebar-nav-item active" href="../采购台账/采购台账.html"><span class="sni-icon">📊</span>采购台账</a>
      <a class="sidebar-nav-item" href="../采购计划审批/采购计划审批.html"><span class="sni-icon">✅</span>采购计划审批</a>
      <a class="sidebar-nav-item" href="../供应商付款申请审批/供应商付款申请审批.html"><span class="sni-icon">💰</span>供应商付款申请审批</a>
      <a class="sidebar-nav-item" href="../PO应付清单/PO应付清单.html"><span class="sni-icon">📄</span>PO 应付清单</a>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="breadcrumb-bar">
      <span>采购管理</span><span class="sep">/</span><span class="current">采购台账</span>
    </div>

    <div class="content-area">

      <!-- 筛选区 -->
      <div class="card">
        <div class="filter-grid">
          <div class="filter-item"><span>采购计划编号</span><el-input placeholder="请输入" size="small"></el-input></div>
          <div class="filter-item"><span>项目编号</span><el-input placeholder="请输入" size="small"></el-input></div>
          <div class="filter-item"><span>项目名称</span><el-input placeholder="请输入" size="small"></el-input></div>
          <div class="filter-item"><span>申请人</span><el-input placeholder="请输入" size="small"></el-input></div>
          <div class="filter-btns">
            <el-button type="primary" size="small">查询</el-button>
            <el-button size="small">重置</el-button>
          </div>
        </div>
      </div>

      <!-- 表格区 -->
      <div class="card">
        <div class="dot-legend">
          <span style="font-size:12px;color:#606266;margin-right:4px;">采购计划状态：</span>
          <div class="dot-legend-item"><span class="status-dot dot-green"></span>已完成</div>
          <div class="dot-legend-item"><span class="status-dot dot-yellow"></span>临近截止（≤5天）</div>
          <div class="dot-legend-item"><span class="status-dot dot-red"></span>已逾期</div>
          <div class="dot-legend-item"><span class="status-dot dot-gray"></span>已完成（含延期）</div>
        </div>

        <div class="table-wrapper">
          <el-table
            :data="tableData"
            border
            style="width:100%;"
            :header-cell-style="{ background: '#f5f7fa', color: '#606266', fontWeight: '600', fontSize: '13px', textAlign: 'center' }"
            :cell-style="{ fontSize: '13px', verticalAlign: 'middle' }"
          >
            <!-- ① 采购计划（项目信息 + 4个任务节点）-->
            <el-table-column label="采购计划">
              <el-table-column label="采购计划编号" prop="applyNo" min-width="130" fixed="left"></el-table-column>
              <el-table-column label="项目编号" prop="projectNo" min-width="110" fixed="left"></el-table-column>
              <el-table-column label="项目名称" prop="projectName" min-width="200" fixed="left"></el-table-column>
              <el-table-column label="项目所属大区" prop="region" width="90"></el-table-column>
              <el-table-column label="申请人" prop="applicant" width="80"></el-table-column>
              <el-table-column label="采购对接人" prop="buyer" width="90"></el-table-column>
              <el-table-column label="项目实施地" prop="location" width="90"></el-table-column>
              <el-table-column label="采购内容" min-width="160">
                <template #default="{ row }">
                  <span class="cell-truncate" :title="row.summary">{{ row.summary || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="交付要求" min-width="160">
                <template #default="{ row }">
                  <span class="cell-truncate" :title="row.deliveryReq">{{ row.deliveryReq || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="预算" width="110">
                <template #default="{ row }">
                  <span>{{ row.budget || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="到货/入场时间" width="110">
                <template #default="{ row }">
                  <span>{{ row.arrivalDate || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="采购计划相关文档" width="110" align="center">
                <template #default="{ row }">
                  <el-button v-if="row.hasDocs" link type="primary" size="small" @click="openDocsDialog(row)">查看</el-button>
                  <span v-else style="color:#c0c4cc;">无</span>
                </template>
              </el-table-column>
              <!-- 4个采购计划任务节点 -->
              <el-table-column label="技术文件细化" min-width="150">
                <template #default="{ row }">
                  <div class="date-cell" @click="openTaskDialog(row, 'tech', '技术文件细化')">
                    <span class="status-dot" :class="row.tech.dotClass"></span>
                    <span>{{ row.tech.date }}</span>
                  </div>
                </template>
              </el-table-column>
              <el-table-column label="招采要求发送" min-width="150">
                <template #default="{ row }">
                  <div class="date-cell" @click="openTaskDialog(row, 'bid', '招采要求发送')">
                    <span class="status-dot" :class="row.bid.dotClass"></span>
                    <span>{{ row.bid.date }}</span>
                  </div>
                </template>
              </el-table-column>
              <el-table-column label="定标时间" min-width="150">
                <template #default="{ row }">
                  <div class="date-cell" @click="goUpdateTask(row, 'award', '定标完成')">
                    <span class="status-dot" :class="row.award.dotClass"></span>
                    <span>{{ row.award.date }}</span>
                  </div>
                </template>
              </el-table-column>
              <el-table-column label="采购合同/PO签订" min-width="155">
                <template #default="{ row }">
                  <div class="date-cell" @click="goUpdateTask(row, 'contract', '采购合同/PO签订')">
                    <span class="status-dot" :class="row.contract.dotClass"></span>
                    <span>{{ row.contract.date }}</span>
                  </div>
                </template>
              </el-table-column>
            </el-table-column>

            <!-- ② 中标信息 -->
            <el-table-column label="中标信息">
              <el-table-column label="中标供应商" min-width="120">
                <template #default="{ row }">
                  <span>{{ row.supplier || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="原币价格" width="130">
                <template #default="{ row }">
                  <span v-if="row.currency && row.oriPrice">{{ row.currency }} {{ row.oriPrice }}</span>
                  <span v-else>-</span>
                </template>
              </el-table-column>
              <el-table-column label="人民币价格" width="110">
                <template #default="{ row }">
                  <span>{{ row.cnyPrice || '-' }}</span>
                </template>
              </el-table-column>
            </el-table-column>

            <!-- ④ 正式采购信息 -->
            <el-table-column label="正式采购信息">
              <!-- 采购申请单：ERP 匹配入口，匹配不上时手动维护 -->
              <el-table-column label="采购申请单" width="170">
                <template #default="{ row }">
                  <el-button v-if="row.erpMissing" link type="warning" size="small" @click="openPoDialog(row)">✏️ 匹配不上，手动维护</el-button>
                  <span v-else>{{ row.erpApplyNo || '-' }}</span>
                </template>
              </el-table-column>
              <!-- 采购内容：点击查看物料明细弹窗 -->
              <el-table-column label="采购内容" width="80" align="center">
                <template #default="{ row }">
                  <el-button v-if="!row.erpMissing" link type="primary" size="small" @click="openMaterialDialog(row)">查看</el-button>
                  <span v-else>-</span>
                </template>
              </el-table-column>
              <el-table-column label="采购总价（原币含税）" width="145">
                <template #default="{ row }">
                  <span v-if="row.erpMissing">-</span>
                  <span v-else>{{ row.taxPriceOri || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="采购总价（人民币含税）" width="155">
                <template #default="{ row }">
                  <span v-if="row.erpMissing">-</span>
                  <span v-else>{{ row.taxPriceCny || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="po code" width="130">
                <template #default="{ row }">
                  <span v-if="row.erpMissing">-</span>
                  <span v-else>{{ row.poCode || '-' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="订单类型" width="80">
                <template #default="{ row }">
                  <el-tag v-if="!row.erpMissing && row.orderType" type="primary" size="small">{{ row.orderType }}</el-tag>
                  <span v-else>-</span>
                </template>
              </el-table-column>
            </el-table-column>

            <!-- 操作列 -->
            <el-table-column label="操作" width="100" fixed="right">
              <template #default="{ row }">
                <el-button link type="primary" size="small" @click="goApply(row)">查看申请单</el-button>
              </template>
            </el-table-column>
          </el-table>
        </div>

        <div class="pagination-bar">
          <el-pagination background layout="total, prev, pager, next" :total="12" :page-size="10" :current-page="1"></el-pagination>
        </div>
      </div>

    </div>
  </div>

  <!-- 任务完成弹窗 -->
  <el-dialog v-model="showTaskDialog" :title="`确认任务完成 · ${currentTask ? currentTask.label : ''}`" width="420px">
    <template v-if="currentTask">
      <el-descriptions :column="1" border size="small">
        <el-descriptions-item label="采购计划编号">{{ currentTask.applyNo }}</el-descriptions-item>
        <el-descriptions-item label="项目名称">{{ currentTask.projectName }}</el-descriptions-item>
        <el-descriptions-item label="计划完成日期">{{ currentTask.planDate }}</el-descriptions-item>
        <el-descriptions-item label="当前状态">
          <span class="status-dot" :class="currentTask.dotClass" style="margin-right:6px;"></span>
          <span>{{ dotLabel(currentTask.dotClass) }}</span>
        </el-descriptions-item>
      </el-descriptions>
      <div style="margin-top:16px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;color:#606266;white-space:nowrap;">实际完成日期：</span>
        <el-date-picker v-model="taskActualDate" type="date" size="small" placeholder="选择日期" style="flex:1;"></el-date-picker>
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#909399;">
        交付物上传（可选）：<el-button size="small">上传文件</el-button>
      </div>
    </template>
    <template #footer>
      <el-button @click="showTaskDialog = false">取消</el-button>
      <el-button type="primary" @click="confirmTask">确认完成</el-button>
    </template>
  </el-dialog>

  <!-- ERP 手动维护弹窗 -->
  <el-dialog v-model="showPoDialog" title="手动维护采购申请单（ERP）" width="460px">
    <template v-if="currentPoRow">
      <el-descriptions :column="1" border size="small" style="margin-bottom:16px;">
        <el-descriptions-item label="采购计划编号">{{ currentPoRow.applyNo }}</el-descriptions-item>
        <el-descriptions-item label="中标供应商">{{ currentPoRow.supplier || '-' }}</el-descriptions-item>
        <el-descriptions-item label="原币价格">{{ currentPoRow.currency }} {{ currentPoRow.oriPrice || '-' }}</el-descriptions-item>
      </el-descriptions>
      <el-form :model="poForm" label-width="130px" size="small">
        <el-form-item label="采购申请单（ERP）" required>
          <el-input v-model="poForm.erpApplyNo" placeholder="请输入 ERP 中的采购申请单编号"></el-input>
        </el-form-item>
        <el-form-item label="PO Code">
          <el-input v-model="poForm.poCode" placeholder="可选，若已知可同步填入"></el-input>
        </el-form-item>
      </el-form>
      <div style="font-size:12px;color:#909399;margin-left:130px;margin-top:4px;">
        填入后系统将自动带出采购总价、物料明细、订单类型等 ERP 字段
      </div>
    </template>
    <template #footer>
      <el-button @click="showPoDialog = false">取消</el-button>
      <el-button type="primary" @click="confirmPo">确认</el-button>
    </template>
  </el-dialog>

  <!-- 采购内容（物料明细）弹窗 -->
  <el-dialog v-model="showMaterialDialog" :title="`采购物料明细 · ${currentMaterialRow ? currentMaterialRow.applyNo : ''}`" width="720px">
    <el-table v-if="currentMaterialRow" :data="currentMaterialRow.materials" border size="small"
      :header-cell-style="{ background: '#f5f7fa', fontSize: '12px', color: '#606266' }">
      <el-table-column label="物料号" prop="materialNo" width="110"></el-table-column>
      <el-table-column label="物料名称" prop="materialName" min-width="120"></el-table-column>
      <el-table-column label="物料分类" prop="category" width="90"></el-table-column>
      <el-table-column label="规格型号" prop="spec" min-width="120"></el-table-column>
      <el-table-column label="采购数量" prop="qty" width="80" align="right"></el-table-column>
      <el-table-column label="原币含税单价" prop="unitPrice" width="110" align="right"></el-table-column>
      <el-table-column label="原币含税总价" prop="totalOri" width="110" align="right"></el-table-column>
      <el-table-column label="人民币含税总价" prop="totalCny" width="120" align="right"></el-table-column>
    </el-table>
    <template #footer>
      <el-button @click="showMaterialDialog = false">关闭</el-button>
    </template>
  </el-dialog>

  <!-- 相关文档弹窗 -->
  <el-dialog v-model="showDocsDialog" :title="`采购计划相关文档 · ${currentDocsRow ? currentDocsRow.applyNo : ''}`" width="560px">
    <el-table v-if="currentDocsRow" :data="currentDocsRow.docs" border size="small"
