<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采购订单列表 - GPP</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
    .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: white; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center; padding: 0 16px; z-index: 1000; }
    .logo { display: flex; align-items: center; margin-right: 20px; }
    .nav-tabs { display: flex; align-items: center; gap: 4px; flex: 1; }
    .tab { padding: 3px 10px; border-radius: 12px; font-size: 13px; cursor: pointer; color: #606266; }
    .tab.active { background: #ff7a00; color: white; }
    .nav-right { display: flex; align-items: center; font-size: 13px; }
    .left-sidebar { position: fixed; left: 0; top: 48px; bottom: 0; width: 200px; background: #1a5fa0; display: flex; flex-direction: column; z-index: 999; overflow-y: auto; }
    .sidebar-header { padding: 14px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sidebar-logo-txt { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .sidebar-hamburger-btn { font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer; }
    .sidebar-group { margin-top: 4px; }
    .sidebar-group-title { padding: 10px 16px 4px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; font-size: 13px; color: rgba(255,255,255,0.85); cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; text-decoration: none; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; font-weight: 600; }
    .sni-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .main-content { margin-left: 200px; margin-top: 48px; }
    .breadcrumb { height: 40px; background: white; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center; padding: 0 20px; font-size: 13px; color: #909399; }
    .breadcrumb .current { color: #303133; font-weight: 500; }
    .content-area { padding: 16px 20px; }
    .card { background: white; border-radius: 4px; padding: 16px 20px; margin-bottom: 12px; }
    .filter-row { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
    .filter-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .btn-primary { background: #ff7a00; color: white; border: none; padding: 7px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-default { background: white; color: #606266; border: 1px solid #dcdfe6; padding: 7px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .link-blue { color: #1677ff; cursor: pointer; text-decoration: none; }
    .link-blue:hover { text-decoration: underline; }
    .pagination-wrap { display: flex; justify-content: flex-end; margin-top: 16px; }
    .status-tabs { display: flex; border-bottom: 1px solid #e4e7ed; padding: 0 20px; }
    .status-tab { padding: 11px 14px; font-size: 13px; cursor: pointer; color: #606266; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
    .status-tab:hover { color: #ff7a00; }
    .status-tab.active { color: #ff7a00; border-bottom-color: #ff7a00; font-weight: 600; }
    .tab-badge { display: inline-block; background: #f0f2f5; color: #909399; border-radius: 10px; padding: 0 6px; font-size: 11px; margin-left: 4px; line-height: 18px; }
    .status-tab.active .tab-badge { background: #fff2e8; color: #ff7a00; }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部导航栏 -->
  <div class="top-nav">
    <div class="logo">
      <span style="color:#1677ff;font-weight:bold;font-size:16px;">Geek</span>
      <span style="background:#ff7a00;color:white;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;margin-left:1px;">+</span>
    </div>
    <div class="nav-tabs">
      <span class="tab">GOP</span>
      <span class="tab">GPM</span>
      <span class="tab">SS</span>
      <span class="tab">CPQ</span>
      <span class="tab active">GPP</span>
      <span class="tab">GTS</span>
      <span class="tab">IS</span>
      <span class="tab">ACCOUNT</span>
      <span class="tab">OMS</span>
      <span class="tab">FTS</span>
      <span class="tab">GRP</span>
    </div>
    <div class="nav-right">
      <span style="font-size:18px;cursor:pointer;">⊞</span>
      <span style="font-size:18px;cursor:pointer;margin-left:12px;">⚙</span>
      <span style="margin-left:12px;cursor:pointer;">
        ToDo
        <el-badge value="1232" style="margin-left:4px;"></el-badge>
      </span>
      <span style="margin-left:12px;color:#606266;cursor:pointer;">支持 ∨</span>
      <span style="margin-left:12px;width:28px;height:28px;background:#ccc;border-radius:50%;display:inline-block;"></span>
      <button style="margin-left:12px;border:1px solid #1677ff;color:#1677ff;background:white;padding:4px 10px;border-radius:4px;cursor:pointer;">进入管理后台</button>
    </div>
  </div>

  <!-- 左侧导航栏 -->
  <div class="left-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo-txt">GPP</span>
      <span class="sidebar-hamburger-btn">☰</span>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">供应商门户</div>
      <a class="sidebar-nav-item active" href="../采购订单列表/采购订单列表.html">
        <span class="sni-icon">📦</span>采购订单列表
      </a>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 面包屑 -->
    <div class="breadcrumb">
      <span>采购订单</span>
      <span style="margin: 0 6px;">›</span>
      <span class="current">采购订单列表</span>
    </div>

    <!-- 内容区域 -->
    <div class="content-area">
      <!-- 筛选栏 -->
      <div class="card">
        <div class="filter-row">
          <div class="filter-item">
            <span>PO Code</span>
            <el-input placeholder="请输入 PO Code" style="width:160px;" size="small" clearable></el-input>
          </div>
          <div class="filter-item">
            <span>物料名称</span>
            <el-input placeholder="请输入物料名称" style="width:160px;" size="small" clearable></el-input>
          </div>
          <div class="filter-item">
            <span>付款节点</span>
            <el-select placeholder="请选择" style="width:130px;" size="small" clearable>
              <el-option label="预付款" value="预付款"></el-option>
              <el-option label="发货款" value="发货款"></el-option>
              <el-option label="验收款" value="验收款"></el-option>
            </el-select>
          </div>
          <el-button type="primary" size="small" style="background:#ff7a00;border-color:#ff7a00;">查询</el-button>
          <el-button size="small">重置</el-button>
        </div>
      </div>

      <!-- 表格 -->
      <div class="card" style="padding:0;">
        <!-- 状态页签 -->
        <div class="status-tabs">
          <div class="status-tab" :class="{active: activeTab==='全部'}" @click="activeTab='全部'">
            全部<span class="tab-badge">{{ tabCounts['全部'] }}</span>
          </div>
          <div class="status-tab" :class="{active: activeTab==='未申请'}" @click="activeTab='未申请'">
            未申请<span class="tab-badge">{{ tabCounts['未申请'] }}</span>
          </div>
          <div class="status-tab" :class="{active: activeTab==='审批中'}" @click="activeTab='审批中'">
            审批中<span class="tab-badge">{{ tabCounts['审批中'] }}</span>
          </div>
          <div class="status-tab" :class="{active: activeTab==='已驳回'}" @click="activeTab='已驳回'">
            已驳回<span class="tab-badge">{{ tabCounts['已驳回'] }}</span>
          </div>
        </div>
        <el-table :data="filteredData" style="width:100%;" border stripe>
          <el-table-column prop="poCode" label="PO Code" width="140">
            <template #default="scope">
              <a class="link-blue" @click="goDetail(scope.row)">{{ scope.row.poCode }}</a>
            </template>
          </el-table-column>
          <el-table-column prop="materialName" label="物料名称" width="160"></el-table-column>
          <el-table-column prop="paymentNode" label="付款节点" width="100"></el-table-column>
          <el-table-column prop="paymentRatio" label="付款比例" width="90"></el-table-column>
          <el-table-column prop="amount" label="金额（原币）" width="140"></el-table-column>
          <el-table-column prop="conditionDate" label="具备付款条件日期" width="140"></el-table-column>
          <el-table-column prop="status" label="申请状态" width="100">
            <template #default="scope">
              <el-tag v-if="scope.row.status === '未申请'" type="info" size="small">未申请</el-tag>
              <el-tag v-else-if="scope.row.status === '审批中'" type="warning" size="small">审批中</el-tag>
              <el-tag v-else-if="scope.row.status === '已通过'" type="success" size="small">已通过</el-tag>
              <el-popover v-else-if="scope.row.status === '已驳回'" trigger="click" width="260" placement="top">
                <template #reference>
                  <el-tag type="danger" size="small" style="cursor:pointer;">已驳回 ⓘ</el-tag>
                </template>
                <div style="font-size:13px;">
                  <div style="font-weight:600;margin-bottom:6px;color:#303133;">驳回原因</div>
                  <div style="color:#606266;line-height:1.6;">{{ scope.row.rejectReason }}</div>
                </div>
              </el-popover>
            </template>
          </el-table-column>
          <el-table-column label="操作" width="120" fixed="right">
            <template #default="scope">
              <el-button v-if="scope.row.status === '未申请'" type="warning" size="small" style="font-size:12px;" @click="goApply(scope.row)">发起申请</el-button>
              <el-button v-else-if="scope.row.status === '已驳回'" type="warning" size="small" style="font-size:12px;" @click="goApply(scope.row)">重新发起</el-button>
            </template>
          </el-table-column>
        </el-table>
        <!-- 分页 -->
        <div class="pagination-wrap" style="padding:12px 20px;">
          <el-pagination
            layout="total, prev, pager, next, jumper"
            :total="12"
            :page-size="10"
            :current-page="1"
          ></el-pagination>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      activeTab: '全部',
      tableData: [
        {
          poCode: 'PO-2024-001',
          materialName: '工业机器人控制器',
          paymentNode: '预付款',
          paymentRatio: '30%',
          amount: 'USD 36,000.00',
          conditionDate: '2024-03-01',
          status: '已通过'
        },
        {
          poCode: 'PO-2024-001',
          materialName: '工业机器人控制器',
          paymentNode: '发货款',
          paymentRatio: '50%',
          amount: 'USD 60,000.00',
          conditionDate: '2024-06-15',
          status: '未申请'
        },
        {
          poCode: 'PO-2024-001',
          materialName: '工业机器人控制器',
          paymentNode: '验收款',
          paymentRatio: '20%',
          amount: 'USD 24,000.00',
          conditionDate: '2024-09-30',
          status: '未申请'
        },
        {
          poCode: 'PO-2024-002',
          materialName: '传感器模组',
          paymentNode: '预付款',
          paymentRatio: '40%',
          amount: 'EUR 8,000.00',
          conditionDate: '2024-04-01',
          status: '审批中'
        },
        {
          poCode: 'PO-2024-003',
          materialName: '液压系统组件',
          paymentNode: '预付款',
          paymentRatio: '30%',
          amount: 'CNY 45,000.00',
          conditionDate: '2024-05-10',
          status: '已驳回',
          rejectReason: '上传发票金额（CNY 50,000.00）与付款节点约定金额（CNY 45,000.00）不一致，请重新上传正确金额的发票。'
        }
      ]
    };
  },
  computed: {
    filteredData() {
      if (this.activeTab === '全部') return this.tableData;
      return this.tableData.filter(r => r.status === this.activeTab);
    },
    tabCounts() {
      return {
        '全部':   this.tableData.length,
        '未申请': this.tableData.filter(r => r.status === '未申请').length,
        '审批中': this.tableData.filter(r => r.status === '审批中').length,
        '已驳回': this.tableData.filter(r => r.status === '已驳回').length,
      };
    }
  },
  methods: {
    goOrderList() {
      window.location.href = '../采购订单列表/采购订单列表.html';
    },
    goDetail(row) {
      window.location.href = '../采购订单详情/采购订单详情.html';
    },
    goApply(row) {
      window.location.href = '../发起付款申请/发起付款申请.html';
    }
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
