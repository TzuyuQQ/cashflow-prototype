<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采购订单详情 - GPP</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
    .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: white; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center; padding: 0 16px; z-index: 1000; }
    .logo { display: flex; align-items: center; margin-right: 20px; }
    .nav-tabs { display: flex; align-items: center; gap: 4px; flex: 1; }
    .tab { padding: 3px 10px; border-radius: 12px; font-size: 13px; cursor: pointer; color: #606266; }
    .tab.active { background: #ff7a00; color: white; }
    .nav-right { display: flex; align-items: center; font-size: 13px; }
    .left-sidebar { position: fixed; left: 0; top: 48px; bottom: 0; width: 200px; background: #1a5fa0; display: flex; flex-direction: column; z-index: 999; overflow-y: auto; }
    .sidebar-header { padding: 14px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sidebar-logo-txt { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .sidebar-hamburger-btn { font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer; }
    .sidebar-group { margin-top: 4px; }
    .sidebar-group-title { padding: 10px 16px 4px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; font-size: 13px; color: rgba(255,255,255,0.85); cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; text-decoration: none; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; font-weight: 600; }
    .sni-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .main-content { margin-left: 200px; margin-top: 48px; }
    .breadcrumb { height: 40px; background: white; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center; padding: 0 20px; font-size: 13px; color: #909399; }
    .breadcrumb .current { color: #303133; font-weight: 500; }
    .content-area { padding: 16px 20px; }
    .card { background: white; border-radius: 4px; padding: 16px 20px; margin-bottom: 12px; }
    .section-title { font-size: 14px; font-weight: 600; color: #303133; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .link-blue { color: #1677ff; cursor: pointer; text-decoration: none; }
    .link-blue:hover { text-decoration: underline; }
    .footer-bar { display: flex; align-items: center; padding: 12px 20px; background: white; border-top: 1px solid #e4e7ed; margin-top: 8px; }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部导航栏 -->
  <div class="top-nav">
    <div class="logo">
      <span style="color:#1677ff;font-weight:bold;font-size:16px;">Geek</span>
      <span style="background:#ff7a00;color:white;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;margin-left:1px;">+</span>
    </div>
    <div class="nav-tabs">
      <span class="tab">GOP</span>
      <span class="tab">GPM</span>
      <span class="tab">SS</span>
      <span class="tab">CPQ</span>
      <span class="tab active">GPP</span>
      <span class="tab">GTS</span>
      <span class="tab">IS</span>
      <span class="tab">ACCOUNT</span>
      <span class="tab">OMS</span>
      <span class="tab">FTS</span>
      <span class="tab">GRP</span>
    </div>
    <div class="nav-right">
      <span style="font-size:18px;cursor:pointer;">⊞</span>
      <span style="font-size:18px;cursor:pointer;margin-left:12px;">⚙</span>
      <span style="margin-left:12px;cursor:pointer;">
        ToDo
        <el-badge value="1232" style="margin-left:4px;"></el-badge>
      </span>
      <span style="margin-left:12px;color:#606266;cursor:pointer;">支持 ∨</span>
      <span style="margin-left:12px;width:28px;height:28px;background:#ccc;border-radius:50%;display:inline-block;"></span>
      <button style="margin-left:12px;border:1px solid #1677ff;color:#1677ff;background:white;padding:4px 10px;border-radius:4px;cursor:pointer;">进入管理后台</button>
    </div>
  </div>

  <!-- 左侧导航栏 -->
  <div class="left-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo-txt">GPP</span>
      <span class="sidebar-hamburger-btn">☰</span>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">供应商门户</div>
      <a class="sidebar-nav-item active" href="../采购订单列表/采购订单列表.html">
        <span class="sni-icon">📦</span>采购订单列表
      </a>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 面包屑 -->
    <div class="breadcrumb">
      <span>采购订单</span>
      <span style="margin: 0 6px;">›</span>
      <a class="link-blue" style="font-size:13px;cursor:pointer" @click="goBack">采购订单列表</a>
      <span style="margin: 0 6px;">›</span>
      <span class="current">采购订单详情</span>
    </div>

    <!-- 内容区域 -->
    <div class="content-area">
      <!-- PO 基本信息卡片 -->
      <div class="card">
        <div class="section-title">PO 基本信息</div>
        <el-descriptions :column="3" border size="small">
          <el-descriptions-item label="PO Code">PO-2024-001</el-descriptions-item>
          <el-descriptions-item label="订单类型">
            <el-tag type="primary" size="small">物料</el-tag>
          </el-descriptions-item>
          <el-descriptions-item label="原币含税总价（合计）">USD 120,000.00</el-descriptions-item>
        </el-descriptions>
      </div>

      <!-- 物料明细卡片 -->
      <div class="card">
        <div class="section-title">物料明细</div>
        <el-table :data="materialData" border size="small" style="width:100%;"
          :header-cell-style="{ background: '#f5f7fa', color: '#606266', fontSize: '13px' }">
          <el-table-column type="index" label="序号" width="60" align="center"></el-table-column>
          <el-table-column prop="materialNo" label="物料编号" min-width="130"></el-table-column>
          <el-table-column prop="materialName" label="物料名称" min-width="160"></el-table-column>
          <el-table-column prop="spec" label="规格型号" min-width="120"></el-table-column>
          <el-table-column prop="qty" label="采购数量" width="100" align="right"></el-table-column>
          <el-table-column prop="unitPrice" label="原币含税单价" width="140" align="right"></el-table-column>
          <el-table-column prop="totalPrice" label="原币含税总价" width="140" align="right"></el-table-column>
        </el-table>
      </div>

      <!-- 付款节点表格 -->
      <div class="card" style="padding:16px 20px;">
        <div class="section-title">付款节点明细</div>
        <el-table :data="tableData" style="width:100%;" border stripe>
          <el-table-column prop="paymentNode" label="付款节点" width="100"></el-table-column>
          <el-table-column prop="paymentRatio" label="付款比例" width="90"></el-table-column>
          <el-table-column prop="amount" label="金额（原币）" width="140"></el-table-column>
          <el-table-column prop="conditionDate" label="具备付款条件日期" width="140"></el-table-column>
          <el-table-column prop="status" label="申请状态" width="100">
            <template #default="scope">
              <el-tag v-if="scope.row.status === '未申请'" type="info" size="small">未申请</el-tag>
              <el-tag v-else-if="scope.row.status === '审批中'" type="warning" size="small">审批中</el-tag>
              <el-tag v-else-if="scope.row.status === '已通过'" type="success" size="small">已通过</el-tag>
              <el-tag v-else-if="scope.row.status === '已驳回'" type="danger" size="small">已驳回</el-tag>
            </template>
          </el-table-column>
          <el-table-column label="操作" width="120" fixed="right">
            <template #default="scope">
              <el-button v-if="scope.row.status === '未申请'" type="warning" size="small" style="font-size:12px;" @click="goApply(scope.row)">发起申请</el-button>
              <el-button v-else-if="scope.row.status === '已驳回'" type="warning" size="small" style="font-size:12px;" @click="goApply(scope.row)">重新发起</el-button>
            </template>
          </el-table-column>
        </el-table>
      </div>

      <!-- 底部按钮 -->
      <div class="footer-bar">
        <el-button size="default" @click="goBack">返回列表</el-button>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      materialData: [
        { materialNo: 'MAT-001-2024', materialName: '工业机器人控制器', spec: 'RCU-3000-X', qty: '10 台', unitPrice: 'USD 8,000.00', totalPrice: 'USD 80,000.00' },
        { materialNo: 'MAT-002-2024', materialName: '伺服驱动器', spec: 'SD-500-A', qty: '20 个', unitPrice: 'USD 1,200.00', totalPrice: 'USD 24,000.00' },
        { materialNo: 'MAT-003-2024', materialName: '安装调试服务', spec: '-', qty: '1 次', unitPrice: 'USD 16,000.00', totalPrice: 'USD 16,000.00' },
      ],
      tableData: [
        {
          paymentNode: '预付款',
          paymentRatio: '30%',
          amount: 'USD 36,000.00',
          conditionDate: '2024-03-01',
          status: '已通过'
        },
        {
          paymentNode: '发货款',
          paymentRatio: '50%',
          amount: 'USD 60,000.00',
          conditionDate: '2024-06-15',
          status: '未申请'
        },
        {
          paymentNode: '验收款',
          paymentRatio: '20%',
          amount: 'USD 24,000.00',
          conditionDate: '2024-09-30',
          status: '未申请'
        }
      ]
    };
  },
  methods: {
    goBack() {
      window.location.href = '../采购订单列表/采购订单列表.html';
    },
    goApply(row) {
      window.location.href = '../发起付款申请/发起付款申请.html';
    }
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
