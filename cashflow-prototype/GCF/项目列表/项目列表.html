    * { box-sizing:border-box;margin:0;padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5; }
    .top-nav { position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;padding:0 12px;z-index:1000;gap:8px; }

    .nav-logo-plus { background:#ff7a00;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;line-height:1; }
    .nav-tabs { display:flex;align-items:center;gap:4px;flex:1; }
    .nav-tab { font-size:12px;padding:3px 10px;border-radius:12px;cursor:pointer;color:#606266;white-space:nowrap; }
    .nav-tab.active { background:#ff7a00;color:#fff; }
    .nav-tab.outline-green { border:1px solid #67c23a;color:#67c23a; }
    .nav-right { display:flex;align-items:center;gap:10px;margin-left:8px; }
    .nav-icon { font-size:16px;color:#606266;cursor:pointer; }
    .nav-todo { position:relative;cursor:pointer;font-size:13px;color:#606266; }
    .nav-badge { position:absolute;top:-8px;right:-28px;background:#f56c6c;color:#fff;font-size:10px;padding:1px 4px;border-radius:8px;white-space:nowrap; }
    .nav-arrow { font-size:12px;color:#909399;margin-left:32px; }
    .nav-avatar { width:26px;height:26px;border-radius:50%;background:#c0c4cc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;cursor:pointer; }
    .nav-admin-btn { border:1px solid #1677ff;color:#1677ff;background:transparent;padding:3px 10px;border-radius:4px;font-size:12px;cursor:pointer;white-space:nowrap; }
    .sidebar { position:fixed;top:48px;left:0;bottom:0;width:200px;background:#1a5fa0;display:flex;flex-direction:column;z-index:900;overflow-y:auto; }
    .sidebar-header { padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
    .sidebar-logo-txt { font-size:20px;font-weight:700;color:#fff;letter-spacing:3px; }
    .sidebar-hamburger-btn { font-size:18px;color:rgba(255,255,255,0.7);cursor:pointer; }
    .sidebar-group { margin-top:4px; }
    .sidebar-group-title { padding:10px 16px 4px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:1.5px;text-transform:uppercase; }
    .sidebar-nav-item { display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:rgba(255,255,255,0.85);cursor:pointer;transition:background 0.15s;border-left:3px solid transparent;text-decoration:none; }
    .sidebar-nav-item:hover { background:rgba(255,255,255,0.1);color:#fff; }
    .sidebar-nav-item.active { background:rgba(255,255,255,0.18);color:#fff;border-left-color:#fff;font-weight:600; }
    .sni-icon { font-size:14px;width:18px;text-align:center;flex-shrink:0; }
    .main-wrapper { margin-left:200px;margin-top:48px; }
    .breadcrumb-bar { height:40px;background:#fff;border-bottom:1px solid #e4e7ed;padding:0 20px;display:flex;align-items:center;font-size:13px;color:#909399; }
    .breadcrumb-bar .sep { margin:0 6px; }
    .breadcrumb-bar .current { color:#303133; }
    .content-area { padding:16px 20px; }
    .card { background:#fff;border-radius:4px;padding:16px 20px;margin-bottom:12px; }
    .el-button--primary { --el-button-bg-color:#1677ff;--el-button-border-color:#1677ff;--el-button-hover-bg-color:#4096ff;--el-button-hover-border-color:#4096ff; }

    /* Filter */
    .filter-row { display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center; }
    .filter-item { display:flex;align-items:center;gap:6px;font-size:13px;color:#606266; }
    .filter-item > span { white-space:nowrap;flex-shrink:0; }
    .filter-btns { margin-left:auto;display:flex;gap:8px; }

    /* Status Badges */
    .status-badge { font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500; }
    .st-active    { background:#e6f4ff;color:#1677ff; }
    .st-at-risk   { background:#fff2f0;color:#f56c6c;border:1px solid #ffccc7; }
    .st-on-hold   { background:#f5f5f5;color:#909399;border:1px solid #d9d9d9; }
    .st-completed { background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f; }

    /* Net cash colors */
    .net-pos { color:#52c41a;font-weight:600; }
    .net-neg { color:#f56c6c;font-weight:600; }

    /* Health bar */
    .health-bar-wrap { display:flex;align-items:center;gap:6px; }
    .health-bar-bg { flex:1;height:6px;background:#f0f2f5;border-radius:3px;overflow:hidden;min-width:60px; }
    .health-bar-fill { height:100%;border-radius:3px;transition:width 0.4s; }
    .health-pct { font-size:11px;color:#909399;white-space:nowrap; }

    /* Event badges */
    .event-tag { font-size:11px;padding:1px 6px;border-radius:3px;white-space:nowrap;margin-right:3px; }
    .ev-overdue  { background:#fff2f0;color:#f56c6c;border:1px solid #ffa39e; }
    .ev-due-soon { background:#fff7e6;color:#e6a23c;border:1px solid #ffd591; }
    .ev-ok       { background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f; }

    .cell-truncate { max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block; }
    .pagination-bar { display:flex;justify-content:flex-end;padding-top:12px; }
    .info-tip { display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#bfbfbf;color:#fff;font-size:9px;font-weight:700;font-style:italic;cursor:help;position:relative;margin-left:4px;vertical-align:middle;flex-shrink:0; }
    .info-tip::after { content:attr(data-tip);position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.72);color:#fff;padding:6px 10px;border-radius:4px;font-size:11px;font-weight:400;font-style:normal;white-space:normal;width:380px;line-height:1.6;text-align:left;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:9999; }
    .info-tip:hover::after { opacity:1; }
  </style>
</head>
<body>
<div id="app">

  <div class="top-nav">
    <span class="nav-hamburger">☰</span>
    <div class="nav-logo"><span class="nav-logo-text">Geek</span><span class="nav-logo-plus">+</span></div>
    <div class="nav-tabs">
      <span class="nav-tab">GOP</span><span class="nav-tab">GPM</span><span class="nav-tab">SS</span>
      <span class="nav-tab">CPQ</span><span class="nav-tab outline-green">GPP</span><span class="nav-tab">GTS</span>
      <span class="nav-tab">IS</span><span class="nav-tab">ACCOUNT</span><span class="nav-tab">OMS</span>
      <span class="nav-tab">FTS</span><span class="nav-tab">GRP</span><span class="nav-tab active">GCF</span>
    </div>
    <div class="nav-right">
      <span class="nav-icon">⊞</span><span class="nav-icon">⚙</span>
      <span class="nav-todo">ToDo<span class="nav-badge">24</span></span>
      <span class="nav-arrow">∨</span>
      <div class="nav-avatar">U</div>
      <button class="nav-admin-btn">进入管理后台</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header"><span class="sidebar-logo-txt">GCF</span><span class="sidebar-hamburger-btn">☰</span></div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">现金流管理</div>
      <a class="sidebar-nav-item" href="../../index.html"><span class="sni-icon">📊</span>全局总览</a>
      <a class="sidebar-nav-item active" href="项目列表.html"><span class="sni-icon">📁</span>项目列表</a>
      <a class="sidebar-nav-item" href="../收支明细/收支明细.html"><span class="sni-icon">📋</span>收支明细</a>
      <a class="sidebar-nav-item" href="../月度预测/月度预测.html"><span class="sni-icon">📅</span>月度预测</a>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="breadcrumb-bar">
      <span>现金流管理</span><span class="sep">/</span><span class="current">项目列表</span>
    </div>
    <div class="content-area">

      <!-- Filter -->
      <div class="card">
        <div class="filter-row">
          <div class="filter-item">
  <span>搜索</span>
  <el-input v-model="searchText" placeholder="项目名称 / 客户" clearable style="width:180px;" size="small" @input="applyFilter" @clear="applyFilter"></el-input>
</div>
          <div class="filter-item"><span>项目状态</span>
            <el-select v-model="filterStatus" placeholder="全部" size="small" clearable style="width:110px;">
              <el-option label="进行中" value="active"></el-option>
              <el-option label="风险"   value="at-risk"></el-option>
              <el-option label="暂停"   value="on-hold"></el-option>
              <el-option label="已完成" value="completed"></el-option>
            </el-select>
          </div>
          <div class="filter-item"><span>大区</span>
            <el-select v-model="filterRegion" placeholder="全部" size="small" clearable style="width:100px;">
              <el-option v-for="r in regions" :key="r" :label="r" :value="r"></el-option>
            </el-select>
          </div>
          <div class="filter-item"><span>PM</span>
            <el-select v-model="filterPm" placeholder="全部" size="small" clearable style="width:90px;">
              <el-option v-for="p in pms" :key="p" :label="p" :value="p"></el-option>
            </el-select>
          </div>
          <div class="filter-btns">
            <el-button type="primary" size="small" @click="applyFilter">查询</el-button>
            <el-button size="small" @click="resetFilter">重置</el-button>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:13px;color:#606266;">共 {{ filtered.length }} 个项目</span>
        </div>
        <el-table
          :data="filtered"
          border
          style="width:100%;"
          :header-cell-style="{ background:'#f5f7fa', color:'#606266', fontWeight:'600', fontSize:'13px' }"
          :cell-style="{ fontSize:'13px', verticalAlign:'middle' }"
          @row-click="goDetail"
          :row-style="{ cursor:'pointer' }"
        >
          <el-table-column label="项目编号" prop="projectNo" width="120" sortable></el-table-column>
          <el-table-column label="项目名称" min-width="200" sortable :sort-method="(a,b)=>a.name.localeCompare(b.name)">
            <template #default="{ row }">
              <span class="cell-truncate" :title="row.name" style="color:#1677ff;font-weight:500;">{{ row.name }}</span>
            </template>
          </el-table-column>
          <el-table-column label="客户" min-width="160" sortable :sort-method="(a,b)=>a.client.localeCompare(b.client)">
            <template #default="{ row }">
              <span class="cell-truncate" :title="row.client">{{ row.client }}</span>
            </template>
          </el-table-column>
          <el-table-column label="大区" prop="region" width="70" align="center" sortable></el-table-column>
          <el-table-column label="PM" prop="pm" width="65" align="center" sortable></el-table-column>
          <el-table-column label="状态" width="90" align="center" sortable :sort-method="(a,b)=>a.status.localeCompare(b.status)">
            <template #default="{ row }">
              <span class="status-badge" :class="stClass(row.status)">{{ stLabel(row.status) }}</span>
            </template>
          </el-table-column>
          <el-table-column label="合同总额" width="120" align="right" sortable :sort-method="(a,b)=>a.contractValue-b.contractValue">
            <template #header>合同总额 <span class="info-tip" data-tip="合同签订时约定的总金额，已统一换算为人民币万元展示；多币种项目按签约时汇率折算">i</span></template>
            <template #default="{ row }">{{ fmtWan(row.contractValue) }}</template>
          </el-table-column>
          <el-table-column label="已回款" width="110" align="right" sortable :sort-method="(a,b)=>a.totalCollected-b.totalCollected">
            <template #header>已回款 <span class="info-tip" data-tip="本项目中，客户实际打款且状态为已确认的回款记录金额合计（人民币）；待处理及逾期款不计入">i</span></template>
            <template #default="{ row }">{{ fmtWan(row.totalCollected) }}</template>
          </el-table-column>
          <el-table-column label="净现金流" width="120" align="right" sortable :sort-method="(a,b)=>a.netCash-b.netCash">
            <template #header>净现金流 <span class="info-tip" data-tip="已回款 − 已确认支出；正值（绿色）表示项目现金净流入，负值（红色）说明支出已超过回款，存在资金垫付">i</span></template>
            <template #default="{ row }">
              <span :class="row.netCash >= 0 ? 'net-pos' : 'net-neg'">{{ fmtWanSigned(row.netCash) }}</span>
            </template>
          </el-table-column>
          <el-table-column label="回款进度" width="160" sortable :sort-method="(a,b)=>healthPct(a)-healthPct(b)">
            <template #default="{ row }">
              <el-tooltip
                :content="`已回款 ¥${(row.totalCollected/10000).toFixed(1)}万 / 合同额 ¥${(row.contractValue/10000).toFixed(1)}万  公式：已回款 ÷ 合同额 × 100%`"
                placement="top">
                <div class="health-bar-wrap" style="cursor:help;">
                  <div class="health-bar-bg">
                    <div class="health-bar-fill"
                      :style="{ width: healthPct(row) + '%', background: healthColor(row) }">
                    </div>
                  </div>
                  <span class="health-pct">{{ healthPct(row) }}%</span>
                </div>
              </el-tooltip>
            </template>
          </el-table-column>
          <el-table-column label="近期事件" width="140">
            <template #header>近期事件 <span class="info-tip" data-tip="逾期：已开票但超过到期日仍未收款；近期到期：到期日在今日起 7 天内的待处理应收款；两者均无则显示正常">i</span></template>
            <template #default="{ row }">
              <span v-if="row.overdueAR.length"  class="event-tag ev-overdue">逾期 {{ row.overdueAR.length }} 笔</span>
              <span v-if="row.dueSoon.length"     class="event-tag ev-due-soon">{{ row.dueSoon.length }} 笔近期到期</span>
              <span v-if="!row.overdueAR.length && !row.dueSoon.length" class="event-tag ev-ok">正常</span>
            </template>
          </el-table-column>
          <el-table-column label="操作" width="90" fixed="right" align="center">
            <template #default="{ row }">
              <el-button link type="primary" size="small" @click.stop="goDetail(row)">查看详情</el-button>
            </template>
          </el-table-column>
        </el-table>
        <div class="pagination-bar">
          <el-pagination background layout="total, prev, pager, next"
            :total="filtered.length" :page-size="10" :current-page="1">
          </el-pagination>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

const TODAY = new Date();
const IN7   = new Date(+TODAY + 7*86400000);
function sumAmt(arr) { return arr.reduce((s,e)=>s+e.amountCny,0); }
function fmtWan(n) { const w=Math.abs(n)/10000; const s=w>=100?Math.round(w).toLocaleString():w.toFixed(1); return (n<0?'-':'')+'¥'+s+'万'; }
function fmtWanSigned(n) { const w=Math.abs(n)/10000; const s=w>=100?Math.round(w).toLocaleString():w.toFixed(1); return (n<0?'-¥':'+¥')+s+'万'; }
function summarize(id) {
  const e = CASH_ENTRIES.filter(x=>x.projectId===id);
  const totalCollected = sumAmt(e.filter(x=>x.type==='receipt'&&x.direction==='in'&&x.status==='confirmed'));
  const totalExpenses  = sumAmt(e.filter(x=>x.type==='expense'&&x.direction==='out'&&x.status==='confirmed'));
  const overdueAR  = e.filter(x=>x.status==='overdue'&&x.direction==='in');
  const dueSoon    = e.filter(x=>x.status==='pending'&&x.dueDate&&new Date(x.dueDate)>=TODAY&&new Date(x.dueDate)<=IN7);
  return { totalCollected, totalExpenses, netCash: totalCollected-totalExpenses, overdueAR, dueSoon };
}

const { createApp } = Vue;
createApp({
  data() {
    const rows = PROJECTS.map(p=>({ ...p, ...summarize(p.id) }));
    return {
      rows,
      filtered: [...rows],
      searchText: '',
      filterStatus: '',
      filterRegion: '',
      filterPm: '',
      regions: [...new Set(PROJECTS.map(p=>p.region))],
      pms:     [...new Set(PROJECTS.map(p=>p.pm))],
    };
  },
  methods: {
    fmtWan, fmtWanSigned,
    stLabel(s) { return { active:'进行中','at-risk':'风险','on-hold':'暂停',completed:'已完成' }[s]??s; },
    stClass(s) { return { active:'st-active','at-risk':'st-at-risk','on-hold':'st-on-hold',completed:'st-completed' }[s]??''; },
    healthPct(row) {
      if (!row.contractValue) return 0;
      return Math.min(100, Math.round(row.totalCollected / row.contractValue * 100));
    },
    healthColor(row) {
      if (row.status === 'at-risk' || row.netCash < 0) return '#f56c6c';
      if (row.status === 'completed') return '#52c41a';
      return '#1677ff';
    },
    applyFilter() {
      this.filtered = this.rows.filter(r => {
        if (this.searchText) {
          const q = this.searchText.toLowerCase();
          if (!r.name.toLowerCase().includes(q) && !r.client.toLowerCase().includes(q)) return false;
        }
        if (this.filterStatus && r.status !== this.filterStatus) return false;
        if (this.filterRegion && r.region !== this.filterRegion) return false;
        if (this.filterPm    && r.pm     !== this.filterPm)     return false;
        return true;
      });
    },
    resetFilter() {
      this.searchText = ''; this.filterStatus = ''; this.filterRegion = ''; this.filterPm = '';
      this.filtered = [...this.rows];
    },
    goDetail(row) {
      window.location.href = `../项目详情/项目详情.html?id=${row.id}`;
    },
  },
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
